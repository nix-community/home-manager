# Generated by Home Manager.

account example {
	server imap.example.com:993
	username user@example.com
	password-cmd hiq -dF password proto=imaps host=imap.example.com
	local-path /home/hm-user/mail/example
	max-connections 3
	post-sync-cmd notmuch new
}

account work {
	server imap.work.com:993
	username work@work.com
	password-cmd pass show email/work
	local-path /home/hm-user/mail/work
	max-connections 5
	debug true
	tags work priority
}

