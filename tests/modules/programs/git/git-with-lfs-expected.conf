[filter "lfs"]
	clean = "@git-lfs@/bin/git-lfs clean -- %f"
	process = "@git-lfs@/bin/git-lfs filter-process --skip"
	required = true
	smudge = "@git-lfs@/bin/git-lfs smudge --skip -- %f"

[gpg]
	format = "openpgp"

[gpg "openpgp"]
	program = "@gnupg@/bin/gpg"

[user]
	email = "user@example.org"
	name = "John Doe"
